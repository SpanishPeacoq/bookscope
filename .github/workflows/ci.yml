name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  scaffold:
    name: Scaffold Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify baseline files
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENTS.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f .env.example
          test -f .gitignore
          test -f docs/architecture.md
          test -f docs/adr/0001-record-project-baseline.md
